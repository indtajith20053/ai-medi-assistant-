# fly.toml app configuration file for ai-medical-assistant-4-agents-rag-sf
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'ai-medical-assistant-4-agents-rag-sf'
primary_region = 'sin'

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 7860
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
